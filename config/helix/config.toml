# Helix config — terminal-mac-setup
# Quit Helix: ESC, then  :q!  (or :wq to save+quit)
# Tutorial: run `hx --tutor`

theme = "tokyonight"

[editor]
line-number = "relative"
cursorline = true
cursorcolumn = false
mouse = true
true-color = true
bufferline = "multiple"
color-modes = true
auto-format = true
auto-save = false
completion-replace = true
text-width = 100
rulers = [100]
idle-timeout = 50

[editor.statusline]
left  = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.lsp]
display-messages = true
display-inlay-hints = true
auto-signature-help = true

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.whitespace.render]
space    = "none"
tab      = "all"
newline  = "none"

[keys.normal]
# Quick save
"C-s" = ":w"
# Center cursor on screen
"C-d" = ["half_page_down", "align_view_center"]
"C-u" = ["half_page_up",   "align_view_center"]
# Clear search highlight
esc = ["collapse_selection", "keep_primary_selection"]
