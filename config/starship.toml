# Starship — Tokyo Night, terminal-mac-setup
# Minimal two-line prompt. No powerline arrows (which render thin in
# Mono Nerd Fonts) — just colored segments and a bold ❯ on line 2.
#
# Looks like:
#     apple in ~/d/terminal-mac-setup on  main [!?] took 1s at 12:19
#     ❯

add_newline = true
palette = "tokyonight"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$time\
$line_break\
$character"""

[palettes.tokyonight]
bg     = "#1a1b26"
fg     = "#c0caf5"
blue   = "#7aa2f7"
purple = "#bb9af7"
green  = "#9ece6a"
yellow = "#e0af68"
red    = "#f7768e"
cyan   = "#7dcfff"
muted  = "#565f89"

[username]
show_always = true
style_user  = "bold blue"
style_root  = "bold red"
format      = "[$user]($style) "

[hostname]
ssh_only = true
format   = "on [$hostname](bold yellow) "

[directory]
style              = "bold cyan"
format             = "in [$path]($style) "
truncation_length  = 4
truncation_symbol  = "…/"
read_only          = " 󰌾"

[git_branch]
symbol = " "
style  = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style  = "red"
format = "[($all_status$ahead_behind )]($style)"

[nodejs]
symbol = " "
style  = "bold green"
format = "via [$symbol($version )]($style)"
detect_extensions = ["js","mjs","cjs","ts","tsx","jsx"]

[python]
symbol = " "
style  = "bold yellow"
format = "via [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"

[rust]
symbol = " "
style  = "bold red"
format = "via [$symbol($version )]($style)"

[golang]
symbol = " "
style  = "bold cyan"
format = "via [$symbol($version )]($style)"

[cmd_duration]
min_time = 500
style    = "bold yellow"
format   = "took [$duration]($style) "

[time]
disabled    = false
time_format = "%R"
style       = "muted"
format      = "at [$time]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold blue)"
