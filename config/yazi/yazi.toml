# Yazi config — terminal-mac-setup
# Quit Yazi (and have shell follow into the dir) with the `y` wrapper
# function added by install.sh, then press `q`.

[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
tab_size        = 2
max_width       = 1200
max_height      = 1800
cache_dir       = ""
image_filter    = "triangle"
image_quality   = 85
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'hx "$@"', desc = "Helix", block = true, for = "unix" },
]
open = [
  { run = 'open "$@"', desc = "Open with macOS default", for = "macos" },
]
play = [
  { run = 'mpv --really-quiet "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { name = "*/",                use = "edit" },
  { mime = "text/*",            use = "edit" },
  { mime = "video/*",           use = "play" },
  { mime = "audio/*",           use = "play" },
  { mime = "image/*",           use = "open" },
  { mime = "application/pdf",   use = "open" },
  { mime = "application/json",  use = "edit" },
  { mime = "*",                 use = "open" },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912   # 512 MB
image_bound      = [0, 0]
suppress_preload = false
