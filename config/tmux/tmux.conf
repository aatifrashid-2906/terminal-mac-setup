# tmux config — terminal-mac-setup
# Tokyo Night-ish, vi keys, mouse-on, 0-indexed panes.

# ── Reload ─────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Reloaded"

# ── Prefix ─────────────────────────────────────────────────────────
# Keep C-b as default. (Don't fight muscle memory.)

# ── Behaviour ──────────────────────────────────────────────────────
set  -g  default-terminal       "tmux-256color"
set  -ga terminal-overrides     ",*256col*:Tc"
set  -g  mouse                  on
set  -g  history-limit          50000
set  -g  base-index             1
set  -g  pane-base-index        1
set  -g  renumber-windows       on
set  -g  focus-events           on
set  -sg escape-time            10
set  -g  set-clipboard          on

# vi mode in copy
setw -g mode-keys vi
bind   -T copy-mode-vi v send-keys -X begin-selection
bind   -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Splits / nav (more intuitive than %, ") ───────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Tokyo Night style ──────────────────────────────────────────────
set -g status-position top
set -g status-justify left
set -g status-style          "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length    50
set -g status-right-length   80

set -g status-left  "#[fg=#1a1b26,bg=#7aa2f7,bold]   #S #[fg=#7aa2f7,bg=#1a1b26]  "
set -g status-right "#[fg=#7aa2f7]#H  #[fg=#bb9af7]%a %d %b #[fg=#9ece6a]%H:%M "

# Window status
set -g window-status-format          "#[fg=#565f89] #I:#W "
set -g window-status-current-format  "#[fg=#1a1b26,bg=#bb9af7,bold] #I:#W "

# Pane borders
set -g pane-border-style          "fg=#414868"
set -g pane-active-border-style   "fg=#7aa2f7"

# Messages
set -g message-style       "fg=#1a1b26,bg=#e0af68,bold"
set -g mode-style          "fg=#1a1b26,bg=#7dcfff,bold"

# ── Per-pane bottom-line look (helps panes feel like the video) ───
set -g pane-border-status off
